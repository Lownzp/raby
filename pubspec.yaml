name: raby
description: "A local-first rabbit archive app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

hooks:
  user_defines:
    sqlite3:
      source: test-sqlite3
      directory: tooling/sqlite3-prebuilt/

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0
  drift: 2.33.0
  sqlite3: 3.3.2
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3
  fl_chart: ^1.2.0
  intl: ^0.20.2
  collection: ^1.19.1
  image_picker: ^1.2.2
  lucide_flutter: ^1.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: 2.33.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  fonts:
    - family: RabyChillRoundF
      fonts:
        - asset: assets/fonts/chill-round/ChillRoundF.ttf
          weight: 400
    - family: RabyChillRoundM
      fonts:
        - asset: assets/fonts/chill-round/ChillRoundM.ttf
          weight: 400
  assets:
    - assets/images/brand/logo_raby.png
    - assets/images/icons/home/icon_tab_home.png
    - assets/images/icons/home/icon_tab_home_active.png
    - assets/images/icons/home/icon_tab_weight.png
    - assets/images/icons/home/icon_tab_weight_active.png
    - assets/images/icons/home/icon_tab_profile.png
    - assets/images/icons/home/icon_tab_profile_active.png
    - assets/images/icons/home/icon_search.png
    - assets/images/icons/home/icon_add.png
    - assets/images/icons/home/icon_settings.png
    - assets/images/rabbits/home/hero_scene_background_v2.png
    - assets/images/rabbits/home/rabbit_home_sticker_01.png
    - assets/images/rabbits/home/rabbit_home_sticker_02.png
    - assets/images/rabbits/home/rabbit_home_sticker_03.png
    - assets/images/rabbits/home/rabbit_timeline_01.png
    - assets/images/rabbits/home/rabbit_timeline_02.png
    - assets/images/rabbits/home/rabbit_timeline_03.png
    - assets/images/stickers/sticker_carrot.png
    - assets/images/stickers/sticker_flower.png
    - assets/images/stickers/sticker_scale.png
    - assets/images/stickers/sticker_diary.png
    - assets/images/stickers/sticker_heart.png
